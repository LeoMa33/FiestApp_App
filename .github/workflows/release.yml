name: Build & Release Assets

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract tag name
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env file
        run: |
          echo "MAPBOX_TOKEN=${{ secrets.MAPBOX_TOKEN }}" >> .env
          echo "S3_ENDPOINT=${{ secrets.S3_ENDPOINT }}" >> .env
          echo "API_BASE=${{ secrets.API_BASE }}" >> .env

      # Étape cruciale pour corriger l'erreur "google-services.json is missing"
      - name: Decode Google Services JSON
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json

      - name: Build APK & AppBundle
        run: |
          flutter build apk --release --build-name=${{ steps.get_version.outputs.VERSION }} --build-number=${{ github.run_number }}
          flutter build appbundle --release --build-name=${{ steps.get_version.outputs.VERSION }} --build-number=${{ github.run_number }}

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔔 Discord Notification
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            curl -H "Content-Type: application/json" -X POST -d '{
              "username": "Mizu Builder",
              "avatar_url": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
              "content": "🚀 **Fiestapp Mobile - Build Réussi !**\n\n**📱 Version :** `${{ steps.get_version.outputs.VERSION }}`\n**📦 Artifacts :** APK & AppBundle générés ✅\n\n**🔗 Téléchargement (Release GitHub) :**\n${{ steps.create_release.outputs.html_url }}\n\n*Note : Vous trouverez l’APK directement dans les assets de la release ci-dessus.*"
            }' ${{ secrets.DISCORD_WEBHOOK_URL }}
          else
            curl -H "Content-Type: application/json" -X POST -d '{
              "username": "Mizu Builder Error",
              "avatar_url": "https://cdn-icons-png.flaticon.com/512/595/595067.png",
              "content": "❌ **Échec du Build Fiestapp Mobile !**\n\n**Tag :** `${{ steps.get_version.outputs.VERSION }}`\n**Commit :** `${{ github.sha }}`\n\n⚠️ Le build a échoué. Vérifiez les logs :\n🔗 [Logs GitHub Actions](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            }' ${{ secrets.DISCORD_WEBHOOK_URL }}
          fi
